name: Deploy to Contabo

on:
  push:
    branches:
      - main

# Never let two deploys race on the same server directory. Newer push wins;
# the in-flight one is cancelled so we don't end up with a half-swapped build.
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to mozhippattru.org
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /var/www/japanese-lms

            echo "── Pulling latest code..."
            # Next.js rewrites tsconfig.json (and npm rewrites package-lock.json)
            # during builds, leaving the server's working tree dirty. Discard
            # those local edits so `git pull` never aborts on a merge conflict.
            git checkout -- package-lock.json tsconfig.json 2>/dev/null || true
            git pull origin main

            echo "── Applying idempotent DB schema + seed files..."
            DB_URL="$(grep '^DATABASE_URL=' .env 2>/dev/null | head -1 | cut -d= -f2-)"
            if [ -n "$DB_URL" ] && command -v psql >/dev/null 2>&1; then
              psql "$DB_URL" -f db/003_posts.sql || echo "  (003_posts.sql warning — continuing)"
              for f in $(ls db/seed_posts_*.sql 2>/dev/null | sort); do
                echo "  seeding $f"
                psql "$DB_URL" -f "$f" || echo "  ($f warning — continuing)"
              done
            else
              echo "  (skipped — no DATABASE_URL or psql)"
            fi

            echo "── Installing dependencies..."
            npm install --legacy-peer-deps > /dev/null 2>&1

            echo "── Building (into .next-new, leaving the live build untouched)..."
            # Clear stale generated route types from the live .next: tsconfig
            # includes .next/types/**, but the build writes fresh types to
            # .next-new/types — so without this the type-check reads the OLD
            # build's types and fails whenever a route/page is deleted.
            rm -rf .next-new .next/types .next/dev/types
            NEXT_DIST_DIR=.next-new npm run build

            echo "── Swapping in the new build..."
            rm -rf .next-old
            mv .next .next-old 2>/dev/null || true
            mv .next-new .next

            echo "── Restarting app..."
            pm2 restart japanese-lms

            echo "── Deploy complete! ✓"
